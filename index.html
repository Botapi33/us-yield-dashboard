<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BondStats | US Yield</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Inter,system-ui;
background:#06121f;
color:#e6edf5;
}

.wrap{
max-width:880px;
margin:auto;
padding:20px;
}

.title{font-size:20px;font-weight:600;}
.subtitle{font-size:12px;color:#7f96b2;margin-top:3px;}

.metrics{
display:flex;
gap:20px;
margin-top:12px;
font-size:13px;
color:#9fb2c9;
}

.metrics b{color:#fff;font-weight:500;}

.chart-box{
margin-top:10px;
height:240px;
}

.signal{
margin-top:12px;
font-size:13px;
color:#c6d4e5;
}

.footer{
margin-top:10px;
font-size:11px;
color:#6f859f;
}
</style>
</head>

<body>

<div class="wrap">

<div class="title">US Yield</div>
<div class="subtitle">US 10Y Treasury</div>

<div class="metrics" id="metrics"></div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<div class="signal" id="signal"></div>

<div class="footer">
BondStats Data · Daily
</div>

</div>

<script>

let chart;
const URL = "https://botapi33.github.io/bondstats-global-yields/global_yields.json";

/* ===== CHART ===== */

function drawChart(data){

if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:data.map(d=>d.date),
datasets:[{
data:data.map(d=>d.value),
borderColor:"#6ee7b7",
borderWidth:2,
pointRadius:4,
tension:0.25
}]
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{
ticks:{
color:"#7f96b2",
callback:v=>v.toFixed(2)+"%"
},
grid:{color:"rgba(255,255,255,0.05)"}
}
}
}
});
}

/* ===== SIGNAL ===== */

function signal(change){

if(change > 0) return "Yields rising → tightening conditions";
if(change < 0) return "Yields declining → easing conditions";
return "Stable yield environment";

}

/* ===== LOAD ===== */

async function load(){

const res = await fetch(URL);
const json = await res.json();

const us = json.countries["united_states"];

if(!us){
document.getElementById("metrics").innerText = "No US data";
return;
}

const data = [
{date: us.previousDate, value: us.previousValue},
{date: us.date, value: us.value}
];

document.getElementById("metrics").innerHTML = `
Yield: <b>${us.value.toFixed(2)}%</b>
Daily: <b style="color:${us.change>0?'#6ee7b7':'#ff6b6b'}">${us.change.toFixed(2)}</b>
Updated: <b>${us.date}</b>
`;

drawChart(data);

document.getElementById("signal").innerText = signal(us.change);

}

load();

</script>

</body>
</html>
